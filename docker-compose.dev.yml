# Development overlay: re-adds live-reload on top of docker-compose.yml.
#
# Run with both files so this one's settings win:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Uvicorn watches the bind-mounted source, so edits on the host are reflected
# immediately. The base file's production command and image-only code are kept
# untouched for real deployments.
services:
  web:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    ports:
      # Dev runs on a different host port (8087) so it can sit alongside a
      # production stack (8086) without a clash.
      - "8087:8000"
    environment:
      # Email links must point at this overlay's host-published port (8087),
      # not the base file's 8086.
      BASE_URL: ${BASE_URL:-http://localhost:8087}
    volumes:
      # Mount the project source over the image's /app for edit-on-save. The
      # base file's todo-data:/data mount is merged in automatically, so uploads
      # still persist and are unaffected by this bind mount.
      - .:/app
