<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in · Meerato</title>
  <meta name="theme-color" content="#2185d0" />
  <link rel="icon" href="/static/logo-192.png" />
  <link rel="apple-touch-icon" href="/static/logo-192.png" />
  <style>
    :root { --brand: #2185d0; }
    html, body {
      height: 100%; margin: 0; background: #f4f5f7; color: #1f2328;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card {
      width: 100%; max-width: 380px; background: #fff; border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .08); padding: 2.4rem 2rem; text-align: center;
    }
    .logo { width: 76px; height: auto; margin: 0 auto 1.2rem; display: block;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, .12)); }
    h1 { font-size: 1.4rem; margin: 0 0 .35rem; }
    .lede { color: #57606a; margin: 0 0 1.6rem; font-size: .95rem; }
    form { display: flex; flex-direction: column; gap: .8rem; }
    input[type="email"] {
      font: inherit; padding: .75rem .9rem; border: 1px solid #d0d7de; border-radius: 8px;
      outline: none; transition: border-color .15s ease;
    }
    input[type="email"]:focus { border-color: var(--brand); }
    button {
      font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: 8px;
      padding: .8rem 1rem; background: var(--brand); color: #fff; transition: opacity .15s ease;
    }
    button:disabled { opacity: .6; cursor: default; }
    .message { margin-top: 1rem; font-size: .9rem; min-height: 1.2em; }
    .message.error { color: #d4351c; }
    .message.success { color: #1a7f37; }
    .note { color: #8b949e; font-size: .8rem; margin-top: 1.4rem; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/static/logo-192.png" alt="Meerato" />
    <h1>Sign in to Meerato</h1>
    <p class="lede">No password needed. We'll email you a magic sign-in link.</p>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required autofocus />
      <button type="submit" id="login-submit">Email me a sign-in link</button>
    </form>
    <div class="message" id="login-message" role="status" aria-live="polite"></div>
    <p class="note">🔒 The link signs you in here, on this device.</p>
  </div>

  <script>
    // Running inside the Electron desktop shell? Then magic-link sign-in needs a
    // meerato:// deep link so the session lands in the app, not the system browser.
    const IS_DESKTOP = /Electron/i.test(navigator.userAgent);

    const form = document.getElementById("login-form");
    const emailInput = document.getElementById("login-email");
    const submitBtn = document.getElementById("login-submit");
    const message = document.getElementById("login-message");

    function setMessage(text, kind) {
      message.textContent = text;
      message.className = "message" + (kind ? " " + kind : "");
    }

    // Already signed in? Skip the form and go straight into the app.
    fetch("/api/auth/me", { credentials: "same-origin" })
      .then((r) => { if (r.ok) location.replace("/"); })
      .catch(() => {});

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;
      submitBtn.disabled = true;
      setMessage("Sending…");
      try {
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ email, client: IS_DESKTOP ? "desktop" : undefined }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || "Something went wrong. Please try again.");
        setMessage(data.message || "Check your email for a sign-in link.", "success");
        form.reset();
      } catch (err) {
        setMessage(err.message || "Something went wrong. Please try again.", "error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
