<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 190" role="img" aria-label="A task shared via link and with watchers added by email, kept up to date automatically">
  <rect width="360" height="190" fill="#eef7fe"/>
  <!-- Task card -->
  <g transform="translate(28,26)">
    <rect width="304" height="138" rx="11" fill="#ffffff" stroke="#e6e8eb"/>
    <!-- task title -->
    <rect x="22" y="24" width="130" height="8" rx="4" fill="#c9d1d9"/>

    <!-- share link chip -->
    <g transform="translate(22,48)">
      <rect width="160" height="26" rx="13" fill="#f6f8fa" stroke="#d0d7de"/>
      <path d="M16 13 a4 4 0 0 1 4 -4 h4 a4 4 0 0 1 0 8 h-4 a4 4 0 0 1 -4 -4 M24 13 a4 4 0 0 1 4 -4 h4 a4 4 0 0 1 0 8 h-4 a4 4 0 0 1 -4 -4" fill="none" stroke="#2185d0" stroke-width="1.6"/>
      <text x="40" y="17" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#2185d0">Copy share link</text>
    </g>

    <!-- watchers -->
    <text x="22" y="100" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#57606a">Watching</text>
    <g transform="translate(22,108)">
      <!-- avatar 1 -->
      <circle cx="13" cy="13" r="13" fill="#2185d0"/>
      <text x="13" y="17" text-anchor="middle" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">A</text>
      <!-- avatar 2 -->
      <circle cx="33" cy="13" r="13" fill="#1a7f37" stroke="#ffffff" stroke-width="2"/>
      <text x="33" y="17" text-anchor="middle" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">M</text>
      <!-- email chip -->
      <g transform="translate(56,1)">
        <rect width="158" height="24" rx="12" fill="#ffffff" stroke="#d0d7de"/>
        <rect x="12" y="8" width="13" height="9" rx="1.5" fill="none" stroke="#8c959f" stroke-width="1.4"/>
        <path d="M12.5 9 L18.5 13 L24.5 9" fill="none" stroke="#8c959f" stroke-width="1.4"/>
        <text x="32" y="16" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-size="10.5" fill="#57606a">sam@example.com</text>
      </g>
    </g>
  </g>
</svg>
